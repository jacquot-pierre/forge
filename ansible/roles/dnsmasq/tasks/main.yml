- name: Install required dependencies
  ansible.builtin.apt:
    name: "{{ item }}"
    update_cache: true
    state: present
  loop:
    - curl
    - dnsmasq

- name: Configure the /etc/hosts
  ansible.builtin.blockinfile:
    path: /etc/hosts
    owner: root
    group: root
    mode: '0644'
    marker: "# {mark} Deploy via ansible"
    block: |
      {% for item in hosts_entries %}
      {{ item.ip_address }} {{ item.domain }}
      {% endfor %}
  vars:
    hosts_entries:
      - { ip_address: "192.168.1.201", domain: "dnsmasq" }
      - { ip_address: "192.168.1.202", domain: "haproxy" }
      - { ip_address: "192.168.1.203", domain: "pki" }
      - { ip_address: "192.168.1.204", domain: "machikiflix sonarr radarr prowlarr bazarr qbittorent traefik" }
      - { ip_address: "192.168.1.70", domain: "proxmox" }

- name: Backup dnsmasq default configuration
  ansible.builtin.copy:
    remote_src: true
    src: /etc/dnsmasq.conf
    dest: /etc/dnsmasq.conf.bck
    owner: root
    group: root
    mode: '0644'

- name: Copy dnsmasq.conf to server
  ansible.builtin.copy:
    src: dnsmasq.conf
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Restart dnsmasq
