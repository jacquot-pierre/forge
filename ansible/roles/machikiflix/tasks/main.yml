---
- name: Creating necessary folders
  ansible.builtin.file:
    path: "{{ machikiflix_arr_folder }}/sonarr"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - sonarr
    - radarr
    - bazarr
    - prowlarr

- name: Créer l'arborescence pour les médias (Torrents, Usenet, Media)
  ansible.builtin.file:
    path: "/data/{{ item }}"
    state: directory
    mode: '0755'
    owner: 1000
    group: 1000
    recurse: false
  loop:
    # Torrents
    - torrents/books
    - torrents/movies
    - torrents/music
    - torrents/tv
    # Usenet
    - usenet/incomplete
    - usenet/complete/books
    - usenet/complete/movies
    - usenet/complete/music
    - usenet/complete/tv
    # Media
    - media/books
    - media/movies
    - media/music
    - media/tv

- name: Deploy traefik
  ansible.builtin.include_tasks:
    file: roles/machikiflix/tasks/traefik_deploy.yml

- name: Deploy servarr apps
  ansible.builtin.include_tasks:
    file: roles/machikiflix/tasks/servarr_deploy.yml

- name: Deploy torrent apps
  ansible.builtin.include_tasks:
    file: roles/machikiflix/tasks/torrent_deploy.yml

- name: Deploy media server apps
  ansible.builtin.include_tasks:
    file: roles/machikiflix/tasks/media_server_deploy.yml

- name: Update CA certificates inside all machikiflix containers
  ansible.builtin.command:
    cmd: "docker exec {{ item }} update-ca-certificates"
  loop:
    - traefik
    - jellyfin_docker
    - sonarr_docker
    - radarr_docker
    - prowlarr_docker
    - bazarr_docker
    - gluetun
    - qbittorrent_docker
  ignore_errors: true
  register: update_ca_out
  changed_when: >
    update_ca_out.stdout is defined and (
    '1 added' in update_ca_out.stdout or
    'certificates updated' in update_ca_out.stdout or
    'Added' in update_ca_out.stdout)
