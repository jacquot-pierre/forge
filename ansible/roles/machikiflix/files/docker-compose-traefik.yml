services:
  traefik:
    image: "traefik:v3.6"
    container_name: "traefik"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    ports:
      - "80:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/opt/traefik/traefik.yml:/etc/traefik/traefik.yml"
      - "/root/.step/certs/root_ca.crt:/usr/local/share/ca-certificates/machiki-ca.crt:ro"
    labels:
      - "traefik.http.routers.dashboard.rule=Host(`traefik.guerande.local.net`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=machiki:$$apr1$$cDM1FJxL$$dkk52AOpGrlG5FskxLzEu1"

networks:
  proxy:
    name: proxy
    ipam:
      config:
        - subnet: 172.20.0.0/24
